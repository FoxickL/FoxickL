<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header_first_part">
            <button data-group=".page" data-target="page-1">About me</button>
            <button data-group=".page" data-target="page-2">Language</button>
            <button data-group=".page" data-target="page-3">page3</button>
        </div>
        <div class="header_second_part">
            <a href="https://github.com/FoxickL"> <img  class="avatar" src="https://avatars.githubusercontent.com/u/242401088?s=400&u=d819ff9745089194e840ca8eb35482a55faa8da6&v=4" width="50px"></a>
        </div>
    </header>

    <main>
        <div id="page-1" class="page">
            <h1>Random neko art</h1>
            <div id="art"> 
               <h1 class="waiting">
                Ожидание Нажатия
               </h1>
            </div>
            <div class="butt">
                <button type="button" id="random_neko_art">random neko art</button>
            </div>
        </div>
        <div id="page-2" class="page">page2</div>
        <div id="page-3" class="page">page3</div>
    </main>
</body>
</html>
<script>
let img = document.createElement('img')
    document.getElementById('random_neko_art').addEventListener('click',e=>{
        api()
        document.querySelector('.waiting').innerHTML = ''
        document.getElementById('art').appendChild(img)
        img.className = 'cat_arts'
    })




    document.querySelectorAll('button[data-group]').forEach(e=>{
        e.onclick = event =>{
            document.querySelectorAll(e.dataset.group).forEach(function(elem){
                elem.classList.toggle('show',elem.id === event.currentTarget.dataset.target)
            })
        }
    })
    



let url = 'https://nekos.best/api/v2/neko'
function api(){
fetch(url)
 .then(response => response.json())
  .then(data => {
    console.log(data)
    data.results.forEach(url => {
        let url_neko = (url.url)
        img.src = url_neko
    });    
  });
}
    
    


</script>
